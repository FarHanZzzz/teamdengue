# Render Blueprint — deploys the PrevDengue FastAPI backend.
# In Render: New + -> Blueprint -> connect this repo. It reads this file.
# The trained models + seeded SQLite DB are committed, so no training runs here.
services:
  - type: web
    name: prevdengue-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set these in the Render dashboard (not committed). Enable real LLM responses.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
